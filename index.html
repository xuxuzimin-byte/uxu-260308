<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --primary: #1f4fd1;
      --text: #1f2937;
      --muted: #6b7280;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: radial-gradient(circle at top, #eaf1ff 0%, var(--bg) 55%);
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: min(640px, 100%);
      background: var(--card);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 28px rgba(25, 35, 60, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.5rem, 3vw, 2rem);
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 20px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { opacity: 0.94; }
    button:active { transform: scale(0.98); }

    .numbers {
      margin-top: 22px;
      min-height: 52px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ball {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #0f172a;
      background: #e5ecff;
      border: 1px solid #d7e2ff;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>로또 번호 추천기</h1>
    <p>버튼을 누르면 1~45 사이의 번호 6개를 랜덤 추천합니다.</p>
    <button id="pickBtn" type="button">번호 추천받기</button>
    <div id="numbers" class="numbers" aria-live="polite"></div>
  </main>

  <script>
    function pickLottoNumbers() {
      const set = new Set();
      while (set.size < 6) {
        set.add(Math.floor(Math.random() * 45) + 1);
      }
      return [...set].sort((a, b) => a - b);
    }

    function renderNumbers(nums) {
      const container = document.getElementById('numbers');
      container.innerHTML = nums.map((n) => `<span class="ball">${n}</span>`).join('');
    }

    document.getElementById('pickBtn').addEventListener('click', () => {
      renderNumbers(pickLottoNumbers());
    });
  </script>
</body>
</html>
