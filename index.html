<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --primary: #1f4fd1;
      --text: #1f2937;
      --muted: #6b7280;
      --ball-text: #0f172a;
      --ball-bg: #e5ecff;
      --ball-border: #d7e2ff;
      --shadow: 0 12px 28px rgba(25, 35, 60, 0.12);
      --bg-gradient-top: #eaf1ff;
    }

    body[data-theme="dark"] {
      --bg: #0f172a;
      --card: #111827;
      --primary: #60a5fa;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --ball-text: #e2e8f0;
      --ball-bg: #1e293b;
      --ball-border: #334155;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      --bg-gradient-top: #172554;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: radial-gradient(circle at top, var(--bg-gradient-top) 0%, var(--bg) 55%);
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: min(640px, 100%);
      background: var(--card);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.5rem, 3vw, 2rem);
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 20px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .theme-btn {
      background: transparent;
      color: var(--text);
      border: 1px solid color-mix(in srgb, var(--text) 20%, transparent);
    }

    button:hover { opacity: 0.94; }
    button:active { transform: scale(0.98); }

    .numbers {
      margin-top: 22px;
      min-height: 52px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ball {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: var(--ball-text);
      background: var(--ball-bg);
      border: 1px solid var(--ball-border);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>로또 번호 추천기</h1>
    <p>버튼을 누르면 1~45 사이의 번호 6개를 랜덤 추천합니다.</p>
    <div class="actions">
      <button id="pickBtn" type="button">번호 추천받기</button>
      <button id="themeBtn" class="theme-btn" type="button">다크모드</button>
    </div>
    <div id="numbers" class="numbers" aria-live="polite"></div>
  </main>

  <script>
    const THEME_KEY = 'lotto-theme';

    function pickLottoNumbers() {
      const set = new Set();
      while (set.size < 6) {
        set.add(Math.floor(Math.random() * 45) + 1);
      }
      return [...set].sort((a, b) => a - b);
    }

    function renderNumbers(nums) {
      const container = document.getElementById('numbers');
      container.innerHTML = nums.map((n) => `<span class="ball">${n}</span>`).join('');
    }

    function applyTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      document.getElementById('themeBtn').textContent = theme === 'dark' ? '화이트모드' : '다크모드';
    }

    function getInitialTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === 'dark' || saved === 'light') return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    const initialTheme = getInitialTheme();
    applyTheme(initialTheme);

    document.getElementById('pickBtn').addEventListener('click', () => {
      renderNumbers(pickLottoNumbers());
    });

    document.getElementById('themeBtn').addEventListener('click', () => {
      const nextTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(nextTheme);
      localStorage.setItem(THEME_KEY, nextTheme);
    });
  </script>
</body>
</html>
